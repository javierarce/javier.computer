<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportage Editor</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
/* ── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yellow: #ffc107;
  --blue: #1976d2;
  --green: #2e7d32;
  --orange: #d84315;
  --purple: #ae81ff;
  --red: #c62828;
  --gap-sm: 0.4em;
  --gap-md: 0.8em;
  --gap-xl: 2em;
  --br-subtle: 2px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", SFMono-Regular, ui-monospace, monospace;

  /* Light mode (default) */
  --editor-fg: #1a1a1a;
  --editor-fg-muted: rgba(0,0,0,0.5);
  --editor-fg-faint: rgba(0,0,0,0.25);
  --editor-bg: #f5f5f5;
  --editor-surface: #ffffff;
  --editor-border: rgba(0,0,0,0.12);
  --editor-border-hover: rgba(0,0,0,0.25);
  --editor-hover-bg: rgba(0,0,0,0.06);
  --editor-overlay: rgba(0,0,0,0.55);
  --editor-photo-fallback: #e8e8f0;
  --editor-code-bg: #f0f0f0;
  --editor-primary-text: #1a1a1a;
}

html[data-theme="dark"] {
  --editor-fg: #ffffff;
  --editor-fg-muted: rgba(255,255,255,0.5);
  --editor-fg-faint: rgba(255,255,255,0.25);
  --editor-bg: #0a0a0a;
  --editor-surface: #141414;
  --editor-border: rgba(255,255,255,0.1);
  --editor-border-hover: rgba(255,255,255,0.25);
  --editor-hover-bg: rgba(255,255,255,0.1);
  --editor-overlay: rgba(0,0,0,0.7);
  --editor-photo-fallback: #1a1a2e;
  --editor-code-bg: #020b19;
  --editor-primary-text: #1a1a1a;
}

html { font-size: 15px; }
body {
  font-family: var(--font-sans);
  background: var(--editor-bg);
  color: var(--editor-fg);
  min-height: 100vh;
}

button {
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  border: 1px solid var(--editor-border);
  background: var(--editor-surface);
  color: var(--editor-fg);
  padding: 6px 12px;
  border-radius: 4px;
  transition: background 140ms;
}
button:hover { background: var(--editor-hover-bg); }
button.is-primary {
  background: var(--yellow);
  color: var(--editor-primary-text);
  border-color: var(--yellow);
  font-weight: 600;
}
button.is-primary:hover { background: #e0a800; }
button.is-danger { border-color: var(--red); color: var(--red); }
button.is-danger:hover { background: rgba(198,40,40,0.15); }

input, textarea, select {
  font-family: inherit;
  font-size: 0.85rem;
  background: var(--editor-surface);
  color: var(--editor-fg);
  border: 1px solid var(--editor-border);
  border-radius: 4px;
  padding: 6px 10px;
  outline: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--yellow); }
textarea { resize: vertical; min-height: 60px; }

/* ── Header (toolbar + shelf) ─────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--editor-surface);
  transform: translateY(0);
  transition: transform 250ms ease, opacity 250ms ease;
}
.header.is-collapsed { transform: translateY(calc(-100% + 6px)); opacity: 0; }
.header.is-collapsed:hover,
.header.is-collapsed.is-peeking { transform: translateY(0); opacity: 1; }
.header__trigger {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 42px;
  z-index: 101;
}

/* ── Toolbar ──────────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--editor-surface);
  border-bottom: 1px solid var(--editor-border);
}
.toolbar__title {
  font-weight: 600;
  font-size: 0.9rem;
  margin-right: auto;
  opacity: 0.6;
}
.toolbar__group {
  display: flex;
  gap: 4px;
}

/* ── Metadata Panel ───────────────────────────────────── */
.meta-panel {
  display: none;
  padding: 16px;
  background: var(--editor-surface);
  border-bottom: 1px solid var(--editor-border);
}
.meta-panel.is-open { display: block; }
.meta-panel__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
}
.meta-panel__field { display: flex; flex-direction: column; gap: 4px; }
.meta-panel__field label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.5;
}

/* ── Drag preview ─────────────────────────────────────── */
.sortable-fallback {
  opacity: 0 !important;
}
.sortable-custom-ghost {
  position: fixed;
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  opacity: 0.85;
  pointer-events: none;
  z-index: 9999;
}
.drag-preview {
  position: fixed;
  top: -9999px;
  left: -9999px;
  pointer-events: none;
  z-index: -1;
  border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.drag-preview img {
  display: block;
  max-height: 60px;
  max-width: 60px;
  width: auto;
  height: auto;
  border-radius: 4px;
  object-fit: cover;
}

/* ── Photo Shelf ──────────────────────────────────────── */
.shelf-wrapper {
  position: relative;
}
.shelf {
  padding: 8px 16px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  min-height: 44px;
  height: 120px;
  overflow-y: auto;
  cursor: pointer;
  transition: border-color 200ms, height 250ms ease, padding 250ms ease, opacity 250ms ease;
}
.shelf.is-resizing {
  transition: none;
}
.shelf.is-collapsed {
  height: 0;
  min-height: 0;
  padding-top: 0;
  padding-bottom: 0;
  overflow: hidden;
  opacity: 0;
}
.shelf__resize {
  height: 1px;
  cursor: ns-resize;
  background: var(--editor-border);
  transition: height 150ms, background 150ms;
  position: relative;
}
.shelf__resize:hover,
.shelf__resize.is-active {
  height: 4px;
  background: var(--editor-fg-faint);
}
.shelf.is-dragover {
  border-bottom-color: var(--yellow);
}
.shelf__hint {
  color: var(--editor-fg-faint);
  font-size: 0.8rem;
}
.shelf__photo {
  position: relative;
  cursor: grab;
  flex-shrink: 0;
  animation: shelfFadeIn 200ms ease both;
}
.shelf__photo:active,
.shelf__photo.sortable-chosen {
  cursor: grabbing;
}
.shelf__photo.is-dragging {
  opacity: 0.3;
}
.shelf__photo.is-used {
  opacity: 0.4;
  filter: grayscale(1);
  position: relative;
}
.shelf__photo.is-used::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--yellow);
  opacity: 0.25;
  border-radius: 4px;
  pointer-events: none;
}
.shelf__reorder-indicator {
  width: 2px;
  align-self: stretch;
  background: var(--yellow);
  border-radius: 1px;
  flex-shrink: 0;
}
@keyframes shelfFadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
.shelf__photo img {
  height: 60px;
  width: auto;
  object-fit: contain;
  border-radius: 4px;
  display: block;
}
.shelf__photo.is-portrait img {
  height: 80px;
}
.shelf__photo.is-landscape img {
  height: 50px;
}
.shelf__photo .shelf__remove {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 12px;
  line-height: 18px;
  text-align: center;
  cursor: pointer;
  display: none;
  border: none;
  padding: 0;
}
.shelf__photo:hover .shelf__remove { display: block; }

/* ── Canvas ───────────────────────────────────────────── */
.canvas {
  max-width: 1024px;
  margin: 0 auto;
  padding: 32px 48px 120px;
  display: flex;
  flex-direction: column;
  gap: var(--gap-xl);
  min-height: 400px;
}

.canvas__empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--editor-fg-faint);
  font-size: 0.95rem;
}
.canvas__add {
  display: block;
  margin: 12px auto 0;
  background: none;
  border: 1px dashed var(--editor-border);
  color: var(--editor-fg-faint);
  font-size: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  transition: color 150ms, border-color 150ms;
  padding: 0;
  line-height: 38px;
}
.canvas__add:hover {
  color: var(--editor-fg);
  border-color: var(--editor-border-hover);
  background: none;
}

/* ── Transitions ──────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.node, .shelf__photo {
  animation: fadeIn 200ms ease-out both;
}

/* ── Node (container wrapper) ─────────────────────────── */
.node {
  position: relative;
  border-left: 3px solid transparent;
  transition: border-color 200ms;
}
.node[data-type="stack"]  { border-left-color: var(--blue); }
.node[data-type="row"]    { border-left-color: var(--green); }
.node[data-type="grid"]   { border-left-color: var(--orange); }
.node[data-type="text"]   { border-left-color: var(--purple); }
.node[data-type="photo"]  { border-left-color: transparent; }

.node__controls {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 4px 4px 8px;
  opacity: 0;
  transition: opacity 150ms;
  z-index: 10;
}
.node:hover > .node__controls { opacity: 1; }

.node__label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
}
.node[data-type="stack"]  .node__label { background: var(--blue); color: white; }
.node[data-type="row"]    .node__label { background: var(--green); color: white; }
.node[data-type="grid"]   .node__label { background: var(--orange); color: white; }
.node[data-type="text"]   .node__label { background: var(--purple); color: white; }

.node__btn {
  background: none;
  border: none;
  color: var(--editor-fg-muted);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
}
.node__btn:hover { color: var(--editor-fg); background: none; }

.node__handle {
  cursor: grab;
  opacity: 0.4;
  font-size: 14px;
}
.node__handle:hover { opacity: 1; }

/* ── Class toggles ────────────────────────────────────── */
.node__classes {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.class-toggle {
  font-size: 0.6rem;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--editor-border);
  background: transparent;
  color: var(--editor-fg-muted);
  cursor: pointer;
}
.class-toggle.is-active {
  background: var(--editor-hover-bg);
  color: var(--editor-fg);
  border-color: var(--editor-border-hover);
}

/* ── Layout: stack, row, grid, text ───────────────────── */
.stack-container {
  display: flex;
  flex-direction: column;
  gap: var(--gap-sm);
  width: 100%;
  padding: 2px 0 6px 8px;
  min-height: 30px;
}
.stack-container.has-margin-top { margin-top: 3em; }
.stack-container.has-margin-bottom { margin-bottom: 3em; }

.row-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--gap-sm);
  width: 100%;
  padding: 2px 0 6px 8px;
  min-height: 30px;
}
.row-container.has-one,
.row-container.has-two { justify-content: flex-start; }
.row-container.has-one > .node,
.row-container.has-two > .node { width: 33.3333%; }

.grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  grid-gap: var(--gap-sm);
  width: 100%;
  padding: 2px 0 6px 8px;
  min-height: 30px;
}
.grid-container.is-half {
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
}

.text-container {
  width: 100%;
  padding: 2px 0 6px 8px;
}

.text-editable {
  min-height: 40px;
  padding: 12px 16px;
  background: var(--editor-hover-bg);
  border: 1px solid var(--editor-border);
  border-radius: 4px;
  color: var(--editor-fg);
  font-size: 0.95rem;
  line-height: 1.6;
  outline: none;
}
.text-editable:focus { border-color: var(--purple); }
.text-editable:empty::before {
  content: 'Write your text here…';
  color: var(--editor-fg-faint);
  pointer-events: none;
}
.text-editable p { margin-bottom: 0.8em; }
.text-editable p:last-child { margin-bottom: 0; }

/* ── Photo in canvas ──────────────────────────────────── */
.photo-item {
  position: relative;
  width: 100%;
  cursor: grab;
}
.photo-item:active,
.sortable-chosen .photo-item {
  cursor: grabbing;
}
.photo-item img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: var(--br-subtle);
  background: var(--editor-surface);
}
.photo-item img[data-failed="true"] {
  min-height: 120px;
  background: var(--editor-photo-fallback);
}
.photo-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  font-size: 14px;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity 150ms;
  padding: 0;
  border-radius: 0;
  z-index: 5;
}
.photo-item:hover .photo-remove { opacity: 1; }
.photo-remove:hover { background: rgba(0,0,0,0.7); }
.photo-item .photo-overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(transparent 0%, rgba(0,0,0,0.7) 100%);
  display: none;
  align-items: flex-end;
  padding: 24px 10px 10px;
  border-radius: 0 0 var(--br-subtle) var(--br-subtle);
}
.photo-item:hover .photo-overlay { display: flex; }
.photo-item.is-highlighted::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--yellow);
  border-radius: var(--br-subtle);
  pointer-events: none;
  animation: highlightOverlay 1.5s ease-out forwards;
}
@keyframes highlightOverlay {
  0% { opacity: 0.4; }
  100% { opacity: 0; }
}
.photo-overlay__info {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
}
.photo-overlay__info { color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
.photo-overlay__info input,
.photo-overlay__info select {
  background: rgba(0,0,0,0.5);
  color: #fff;
  border-color: rgba(255,255,255,0.2);
}
.photo-overlay__filename {
  font-size: 0.65rem;
  opacity: 0.7;
  font-family: var(--font-mono);
}
.photo-overlay__fields {
  display: flex;
  gap: 4px;
  align-items: center;
}
.photo-overlay__fields input {
  font-size: 0.7rem;
  padding: 3px 6px;
  flex: 1;
  min-width: 0;
}
.photo-overlay__fields select {
  font-size: 0.7rem;
  padding: 3px 4px;
}

/* ── Drop placeholder ─────────────────────────────────── */
.drop-placeholder {
  border: 2px dashed var(--editor-border);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
  color: var(--editor-fg-faint);
  font-size: 0.8rem;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 200ms;
}
.sortable-ghost {
  opacity: 0.4;
}
.sortable-chosen {
  opacity: 0.8;
}

/* ── Drop indicator ───────────────────────────────────── */
.drop-indicator {
  position: absolute;
  background: var(--yellow);
  border-radius: 2px;
  pointer-events: none;
  z-index: 20;
  transition: top 80ms ease, left 80ms ease;
}
/* Vertical containers (stack): horizontal line */
.stack-container > .drop-indicator {
  height: 2px;
  left: 0;
  right: 0;
}
/* Horizontal containers (row, grid): vertical line */
.row-container > .drop-indicator,
.grid-container > .drop-indicator {
  width: 2px;
  top: 0;
  bottom: 0;
}

/* ── Add button inside containers ─────────────────────── */
.add-child-btn {
  position: absolute;
  right: -32px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--editor-fg-faint);
  font-size: 16px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
  opacity: 0;
  transition: opacity 150ms, color 150ms;
  white-space: nowrap;
}
.node:hover > .add-child-btn { opacity: 1; }
.add-child-btn:hover { color: var(--editor-fg); background: none; }

/* ── Context menu ─────────────────────────────────────── */
.context-menu {
  position: fixed;
  z-index: 200;
  background: var(--editor-surface);
  border: 1px solid var(--editor-border);
  border-radius: 6px;
  padding: 4px;
  min-width: 160px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  display: none;
}
.context-menu.is-open { display: block; }
.context-menu__item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 12px;
  border: none;
  background: none;
  color: var(--editor-fg);
  font-size: 0.8rem;
  cursor: pointer;
  border-radius: 4px;
}
.context-menu__item:hover { background: var(--editor-hover-bg); }
.context-menu__sep {
  height: 1px;
  background: var(--editor-border);
  margin: 4px 0;
}

/* ── Modal ────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--editor-overlay);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.is-open { display: flex; }
.modal {
  background: var(--editor-surface);
  border: 1px solid var(--editor-border);
  border-radius: 8px;
  max-width: 800px;
  width: 90vw;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
}
.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--editor-border);
}
.modal__header h3 { font-size: 1rem; }
.modal__body { padding: 16px; overflow-y: auto; flex: 1; }
.modal__footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--editor-border);
}
.modal textarea.export-output {
  width: 100%;
  min-height: 400px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  line-height: 1.5;
  background: var(--editor-code-bg);
  border: 1px solid var(--editor-border);
  border-radius: 4px;
  padding: 12px;
  color: var(--editor-fg);
}

/* ── Grid modifier visuals ────────────────────────────── */
.grid-container.is-square .photo-item img { aspect-ratio: 1; object-fit: cover; }
.grid-container.is-vertical .photo-item img { aspect-ratio: 9/16; object-fit: cover; }
</style>
</head>
<body>

<!-- Header (toolbar + shelf) -->
<div class="header" id="header">
<!-- Toolbar -->
<div class="toolbar">
  <span class="toolbar__title">Reportage Editor</span>
  <div class="toolbar__group">
    <button onclick="toggleShelf()" id="shelfBtn">Photos</button>
    <button onclick="toggleMeta()">Metadata</button>
    <button onclick="showAddMenu(event)">+ Add</button>
  </div>
  <div class="toolbar__group">
    <button onclick="newReportage()">New</button>
    <button onclick="importMarkdown()">Import</button>
    <button class="is-primary" onclick="exportMarkdown()">Export</button>
    <button onclick="toggleTheme()" id="themeBtn" title="Toggle dark/light mode">Dark</button>
  </div>
</div>

<!-- Metadata Panel -->
<div class="meta-panel" id="metaPanel">
  <div class="meta-panel__grid">
    <div class="meta-panel__field">
      <label>Title</label>
      <input id="meta-title" oninput="updateMeta('title', this.value)">
    </div>
    <div class="meta-panel__field">
      <label>Date</label>
      <input type="date" id="meta-date" oninput="updateMeta('date', this.value)">
    </div>
    <div class="meta-panel__field">
      <label>Default location</label>
      <input id="meta-location" placeholder="e.g. madrid" oninput="updateMeta('location', this.value)">
    </div>
    <div class="meta-panel__field">
      <label>Camera (comma-separated)</label>
      <input id="meta-camera" placeholder="e.g. Ricoh GR IIIx, Fuji X-T5" oninput="updateMeta('camera', this.value)">
    </div>
    <div class="meta-panel__field">
      <label>Cover</label>
      <select id="meta-cover" onchange="updateMeta('cover', this.value)">
        <option value="">— Select —</option>
      </select>
    </div>
    <input type="hidden" id="meta-ratio" value="3/2">
    <div class="meta-panel__field" style="grid-column: 1 / -1">
      <label>Intro</label>
      <textarea id="meta-intro" rows="3" oninput="updateMeta('intro', this.value)"></textarea>
    </div>
    <div class="meta-panel__field" style="grid-column: 1 / -1">
      <label>Translation</label>
      <textarea id="meta-translation" rows="3" oninput="updateMeta('translation', this.value)"></textarea>
    </div>
    <div class="meta-panel__field">
      <label>Permalink (optional)</label>
      <input id="meta-permalink" oninput="updateMeta('permalink', this.value)">
    </div>
    <div class="meta-panel__field">
      <label style="display: flex; align-items: center; gap: 6px;">
        <input type="checkbox" id="meta-hideTitle" onchange="updateMeta('hideTitle', this.checked)">
        Hide title
      </label>
    </div>
  </div>
</div>

<!-- Photo Shelf -->
<div class="shelf-wrapper">
  <div class="shelf" id="shelf"
       ondragover="shelfDragOver(event)" ondragleave="shelfDragLeave(event)" ondrop="shelfDrop(event)"
       onclick="document.getElementById('fileInput').click()">
    <span class="shelf__hint" id="shelfHint">Drop photos here or click to browse</span>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onclick="event.stopPropagation()">
  </div>
  <div class="shelf__resize" id="shelfResize"></div>
</div>
</div><!-- /header -->

<!-- Canvas -->
<div class="canvas" id="canvas"></div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu"></div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">

      <h3>Export Markdown</h3>
      <button onclick="closeExportModal()">✕</button>

      <textarea class="export-output" id="exportOutput" readonly></textarea>
    </div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal__header">
      <h3>Import Markdown</h3>
      <button onclick="closeImportModal()">✕</button>
    </div>
    <div class="modal__body">
      <textarea class="export-output" id="importInput" placeholder="Paste your reportage markdown here..."></textarea>
    </div>
    <div class="modal__footer">
      <button onclick="closeImportModal()">Cancel</button>
      <button class="is-primary" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────
const state = {
  meta: {
    title: '', date: '', location: '', camera: '',
    cover: '', ratio: '3/2', intro: '', translation: '',
    permalink: '', hideTitle: true
  },
  nodes: [],
  shelf: [] // { filename, location, ratio, objectUrl, camera }
};

function uid() { return crypto.randomUUID(); }

function newReportage() {
  if (!confirm('Start a new reportage? This will clear everything.')) return;
  // Revoke object URLs
  state.shelf.forEach(s => { if (s.objectUrl) URL.revokeObjectURL(s.objectUrl); });
  state.meta = {
    title: '', date: '', location: '', camera: '',
    cover: '', ratio: '3/2', intro: '', translation: '',
    permalink: '', hideTitle: true
  };
  state.nodes = [];
  state.shelf = [];
  localStorage.removeItem('reportage-editor-state');
  localStorage.removeItem('reportage-editor-images');
  syncMetaUI();
  renderShelf();
  renderCanvas();
}

function getAllPhotos(nodes) {
  const photos = [];
  for (const n of (nodes || state.nodes)) {
    if (n.type === 'photo') photos.push(n);
    else if (n.children) photos.push(...getAllPhotos(n.children));
  }
  return photos;
}

function findNode(id, nodes) {
  for (const n of (nodes || state.nodes)) {
    if (n.id === id) return n;
    if (n.children) {
      const found = findNode(id, n.children);
      if (found) return found;
    }
  }
  return null;
}

function findParent(id, nodes, parent) {
  for (const n of (nodes || state.nodes)) {
    if (n.id === id) return { parent, list: nodes || state.nodes };
    if (n.children) {
      const found = findParent(id, n.children, n);
      if (found) return found;
    }
  }
  return null;
}

function animateOut(el, callback) {
  let called = false;
  const done = () => { if (!called) { called = true; callback(); } };
  el.style.transition = 'opacity 150ms ease-out, transform 150ms ease-out';
  el.style.opacity = '0';
  el.style.transform = 'scale(0.97)';
  el.addEventListener('transitionend', done, { once: true });
  setTimeout(done, 180);
}

function removeNode(id) {
  const el = document.querySelector(`.node[data-id="${id}"]`);
  const doRemove = () => {
    const node = findNode(id);
    const info = findParent(id);
    if (!info) return;
    const idx = info.list.findIndex(n => n.id === id);
    if (idx >= 0) info.list.splice(idx, 1);
    renderCanvas();
  };
  if (el) {
    animateOut(el, doRemove);
  } else {
    doRemove();
  }
}

// ─── Persistence (IndexedDB for images, localStorage for state) ───
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('reportage-editor', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('images');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveImage(filename, blob) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').put(blob, filename);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadImage(filename) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('images', 'readonly');
    const req = tx.objectStore('images').get(filename);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function deleteImage(filename) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('images', 'readwrite');
    tx.objectStore('images').delete(filename);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

function saveState() {
  const data = JSON.parse(JSON.stringify(state));
  data.shelf.forEach(s => delete s.objectUrl);
  localStorage.setItem('reportage-editor-state', JSON.stringify(data));
}

function loadState() {
  const raw = localStorage.getItem('reportage-editor-state');
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    Object.assign(state.meta, data.meta || {});
    state.nodes = data.nodes || [];
    state.shelf = (data.shelf || []).map(s => ({ ...s, objectUrl: null }));
    return true;
  } catch { return false; }
}

async function restoreImages() {
  for (const entry of state.shelf) {
    const blob = await loadImage(entry.filename);
    if (blob) {
      entry.objectUrl = URL.createObjectURL(blob);
    }
  }
  renderShelf();
  renderCanvas();
}

// ─── Meta ───────────────────────────────────────────────
function updateMeta(key, value) {
  state.meta[key] = value;
  if (key === 'cover' && value) {
    // Auto-set ratio from the cover photo's ratio
    const photo = getShelfPhoto(value) || getAllPhotos().find(p => p.filename === value);
    if (photo && photo.ratio) {
      state.meta.ratio = photo.ratio;
      document.getElementById('meta-ratio').value = photo.ratio;
    }
  }
  saveState();
  if (key === 'cover') return;
  updateCoverDropdown();
}

function syncMetaUI() {
  document.getElementById('meta-title').value = state.meta.title;
  document.getElementById('meta-date').value = state.meta.date;
  document.getElementById('meta-location').value = state.meta.location;
  document.getElementById('meta-camera').value = state.meta.camera;
  document.getElementById('meta-ratio').value = state.meta.ratio;
  document.getElementById('meta-intro').value = state.meta.intro;
  document.getElementById('meta-translation').value = state.meta.translation;
  document.getElementById('meta-permalink').value = state.meta.permalink;
  document.getElementById('meta-hideTitle').checked = state.meta.hideTitle;
  updateCoverDropdown();
}

function updateCoverDropdown() {
  const sel = document.getElementById('meta-cover');
  const photos = getAllPhotos();
  const current = state.meta.cover;
  sel.innerHTML = '<option value="">— Select —</option>' +
    photos.map(p => `<option value="${p.filename}"${p.filename === current ? ' selected' : ''}>${p.filename}</option>`).join('');
}

function toggleMeta() {
  document.getElementById('metaPanel').classList.toggle('is-open');
}

let _shelfHeight = null;
function toggleShelf() {
  const shelf = document.getElementById('shelf');
  const collapsing = !shelf.classList.contains('is-collapsed');
  if (collapsing) {
    _shelfHeight = shelf.style.height || null;
    shelf.style.height = '';
  }
  shelf.classList.toggle('is-collapsed');
  if (!collapsing && _shelfHeight) {
    shelf.style.height = _shelfHeight;
  }
}

// Shelf resize
(function() {
  const handle = document.getElementById('shelfResize');
  const shelf = document.getElementById('shelf');
  let startY, startH;

  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    startY = e.clientY;
    startH = shelf.offsetHeight;
    shelf.classList.add('is-resizing');
    handle.classList.add('is-active');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  function onMove(e) {
    const h = Math.max(44, startH + (e.clientY - startY));
    shelf.style.height = h + 'px';
  }

  function onUp() {
    shelf.classList.remove('is-resizing');
    handle.classList.remove('is-active');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
})();

// ─── Photo Shelf ────────────────────────────────────────

function shelfDragOver(e) {
  e.preventDefault();
  document.getElementById('shelf').classList.add('is-dragover');
}
function shelfDragLeave(e) {
  document.getElementById('shelf').classList.remove('is-dragover');
}
function shelfDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('shelf').classList.remove('is-dragover');
  // Only handle file drops from OS, not internal drags
  if (e.dataTransfer.files && e.dataTransfer.files.length) {
    handleFiles(e.dataTransfer.files);
  }
}

let _ratioRenderTimer = null;
function scheduleRatioRender() {
  if (_ratioRenderTimer) clearTimeout(_ratioRenderTimer);
  _ratioRenderTimer = setTimeout(() => {
    _ratioRenderTimer = null;
    renderShelf();
    renderCanvas();
    saveState();
  }, 300);
}

async function handleFiles(files) {
  const fileArray = Array.from(files).filter(f => f.type.startsWith('image/'));

  for (let i = 0; i < fileArray.length; i++) {
    const file = fileArray[i];
    const name = file.name.replace(/\.[^.]+$/, '');
    if (state.shelf.find(s => s.filename === name)) continue;

    const objectUrl = URL.createObjectURL(file);
    const loc = inferLocation(name);
    const cam = inferCamera(name);

    state.shelf.push({ filename: name, location: loc, ratio: '3/2', objectUrl, camera: cam });
    saveImage(name, file);

    // Detect ratio from image dimensions (debounced render)
    const img = new Image();
    img.onload = () => {
      const ratio = img.width >= img.height ? '3/2' : '2/3';
      const entry = state.shelf.find(s => s.filename === name);
      if (entry) entry.ratio = ratio;
      for (const p of getAllPhotos()) {
        if (p.filename === name) p.ratio = ratio;
      }
      scheduleRatioRender();
    };
    img.src = objectUrl;

    // Render shelf in batches of 10 for smooth loading
    if ((i + 1) % 10 === 0 || i === fileArray.length - 1) {
      renderShelf();
      saveState();
      // Yield to browser so it can paint
      await new Promise(r => requestAnimationFrame(r));
    }
  }

  // Auto-detect camera for meta
  const cameras = [...new Set(state.shelf.map(s => s.camera).filter(Boolean))];
  if (cameras.length && !state.meta.camera) {
    state.meta.camera = cameras.join(', ');
    document.getElementById('meta-camera').value = state.meta.camera;
  }
}

function inferLocation(filename) {
  // Pattern: YYYY-MM-DD-Location-CameraID
  const m = filename.match(/^\d{4}-\d{2}-\d{2}-([A-Za-z]+)-/);
  return m ? m[1].toLowerCase() : state.meta.location || '';
}

function inferCamera(filename) {
  if (/DSCF/i.test(filename)) return 'Fuji X-T5';
  if (/R00/i.test(filename)) return 'Ricoh GR IIIx';
  return '';
}

function addFilesToNewStack(files, stack) {
  state.nodes.push(stack);
  addFilesToContainer(files, stack);
}

function addFilesToContainer(files, containerNode) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const name = file.name.replace(/\.[^.]+$/, '');
    const loc = inferLocation(name);
    const cam = inferCamera(name);

    // Add to shelf if not already there
    if (!state.shelf.find(s => s.filename === name)) {
      const objectUrl = URL.createObjectURL(file);
      state.shelf.push({ filename: name, location: loc, ratio: '3/2', objectUrl, camera: cam });
      saveImage(name, file);

      // Detect ratio (debounced render)
      const img = new Image();
      img.onload = () => {
        const ratio = img.width >= img.height ? '3/2' : '2/3';
        const entry = state.shelf.find(s => s.filename === name);
        if (entry) entry.ratio = ratio;
        for (const p of getAllPhotos()) {
          if (p.filename === name) p.ratio = ratio;
        }
        scheduleRatioRender();
      };
      img.src = objectUrl;
    }

    const shelfEntry = state.shelf.find(s => s.filename === name);
    containerNode.children.push({
      id: uid(), type: 'photo',
      location: loc, filename: name,
      ratio: shelfEntry?.ratio || '3/2',
      caption: '', alt: '', classes: []
    });
  }

  // Auto-detect camera for meta
  const cameras = [...new Set(state.shelf.map(s => s.camera).filter(Boolean))];
  if (cameras.length && !state.meta.camera) {
    state.meta.camera = cameras.join(', ');
    document.getElementById('meta-camera').value = state.meta.camera;
  }

  renderShelf();
  renderCanvas();
  saveState();
}

function renderShelf() {
  const shelf = document.getElementById('shelf');
  const hint = document.getElementById('shelfHint');

  // Remove old thumbnails (keep hint and file input)
  shelf.querySelectorAll('.shelf__photo').forEach(el => el.remove());

  if (state.shelf.length) {
    hint.textContent = '+';
    hint.style.cursor = 'pointer';
  } else {
    hint.textContent = 'Drop photos here or click to browse';
    hint.style.cursor = '';
  }

  state.shelf.forEach(photo => {
    const div = document.createElement('div');
    const orient = photo.ratio === '2/3' ? 'is-portrait' : 'is-landscape';
    div.className = `shelf__photo ${orient}`;
    div.draggable = true;
    div.dataset.filename = photo.filename;
    const imgSrc = photo.objectUrl || `https://img.javier.computer/${photo.location}/${photo.filename}_2880.jpg`;

    div.addEventListener('click', e => {
      e.stopPropagation();
      // Scroll to this photo in the canvas if it's used
      const filename = photo.filename;
      const canvasPhotos = document.querySelectorAll('#canvas .node[data-type="photo"]');
      for (const w of canvasPhotos) {
        const id = w.dataset.id;
        const n = findNode(id);
        if (n && n.filename === filename) {
          w.scrollIntoView({ behavior: 'smooth', block: 'center' });
          const photoItem = w.querySelector('.photo-item');
          if (photoItem) {
            photoItem.classList.remove('is-highlighted');
            void photoItem.offsetWidth;
            photoItem.classList.add('is-highlighted');
            photoItem.addEventListener('animationend', () => photoItem.classList.remove('is-highlighted'), { once: true });
          }
          return;
        }
      }
    });
    div.addEventListener('dragstart', e => {
      e.stopPropagation();
      div.classList.add('is-dragging');
      const preview = createDragPreview(imgSrc);
      e.dataTransfer.setDragImage(preview, 30, 30);
      e.dataTransfer.effectAllowed = 'copyMove';
      e.dataTransfer.setData('text/plain', JSON.stringify({
        source: 'shelf',
        filename: photo.filename,
        location: photo.location,
        ratio: photo.ratio
      }));
    });
    div.addEventListener('dragend', () => {
      div.classList.remove('is-dragging');
      removeDragPreview();
      // Remove any lingering reorder indicators
      shelf.querySelectorAll('.shelf__reorder-indicator').forEach(el => el.remove());
    });
    div.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      // Only show reorder indicator for shelf-to-shelf drags
      try {
        const rect = div.getBoundingClientRect();
        const midX = rect.left + rect.width / 2;
        const side = e.clientX < midX ? 'left' : 'right';
        // Remove old indicators
        shelf.querySelectorAll('.shelf__reorder-indicator').forEach(el => el.remove());
        const ind = document.createElement('div');
        ind.className = 'shelf__reorder-indicator';
        if (side === 'left') {
          div.parentNode.insertBefore(ind, div);
        } else {
          div.parentNode.insertBefore(ind, div.nextSibling);
        }
      } catch {}
    });
    div.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      shelf.querySelectorAll('.shelf__reorder-indicator').forEach(el => el.remove());
      // Handle shelf reorder
      try {
        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
        if (data.source === 'shelf') {
          const fromIdx = state.shelf.findIndex(s => s.filename === data.filename);
          const toFilename = div.dataset.filename;
          if (fromIdx >= 0 && data.filename !== toFilename) {
            const rect = div.getBoundingClientRect();
            const midX = rect.left + rect.width / 2;
            const [moved] = state.shelf.splice(fromIdx, 1);
            let toIdx = state.shelf.findIndex(s => s.filename === toFilename);
            if (e.clientX >= midX) toIdx++;
            state.shelf.splice(toIdx, 0, moved);
            saveState();
            renderShelf();
          }
          return;
        }
      } catch {}
    });
    div.title = photo.filename;
    div.innerHTML = `
      <img src="${imgSrc}" alt="${photo.filename}" onerror="this.style.background='var(--editor-photo-fallback)'">
      <div class="shelf__remove" onclick="event.stopPropagation(); removeFromShelf('${photo.filename}')">✕</div>
    `;
    // Insert before the hint
    shelf.insertBefore(div, hint);
  });
}

function removeFromShelf(filename, skipCanvas) {
  const doRemove = () => {
    const idx = state.shelf.findIndex(s => s.filename === filename);
    if (idx >= 0) {
      if (state.shelf[idx].objectUrl) URL.revokeObjectURL(state.shelf[idx].objectUrl);
      state.shelf.splice(idx, 1);
    }
    deleteImage(filename);
    if (!skipCanvas) {
      removePhotoNodes(filename, state.nodes);
      renderCanvas();
    }
    renderShelf();
    saveState();
  };

  const el = document.querySelector(`.shelf__photo[data-filename="${filename}"]`);
  if (el && !skipCanvas) {
    animateOut(el, doRemove);
  } else {
    doRemove();
  }
}

function removePhotoNodes(filename, nodes) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (n.type === 'photo' && n.filename === filename) {
      nodes.splice(i, 1);
    } else if (n.children) {
      removePhotoNodes(filename, n.children);
    }
  }
}

// ─── Drop indicator helpers ─────────────────────────────
function getDropIndex(container, event, isVertical) {
  const children = Array.from(container.querySelectorAll(':scope > .node'));
  const mousePos = isVertical ? event.clientY : event.clientX;

  for (let i = 0; i < children.length; i++) {
    const rect = children[i].getBoundingClientRect();
    const mid = isVertical
      ? rect.top + rect.height / 2
      : rect.left + rect.width / 2;
    if (mousePos < mid) return i;
  }
  return children.length;
}

function positionIndicator(container, indicator, index, isVertical) {
  const children = Array.from(container.querySelectorAll(':scope > .node'));

  if (isVertical) {
    let top;
    if (children.length === 0) {
      top = 0;
    } else if (index >= children.length) {
      const last = children[children.length - 1];
      top = last.offsetTop + last.offsetHeight;
    } else {
      top = children[index].offsetTop - 1;
    }
    indicator.style.top = top + 'px';
    indicator.style.left = '0';
    indicator.style.right = '0';
    indicator.style.width = '';
    indicator.style.height = '2px';
    indicator.style.bottom = '';
  } else {
    let left;
    if (children.length === 0) {
      left = 0;
    } else if (index >= children.length) {
      const last = children[children.length - 1];
      left = last.offsetLeft + last.offsetWidth;
    } else {
      left = children[index].offsetLeft - 1;
    }
    indicator.style.left = left + 'px';
    indicator.style.top = '0';
    indicator.style.bottom = '0';
    indicator.style.height = '';
    indicator.style.width = '2px';
    indicator.style.right = '';
  }
}

function addFilesToContainerAt(files, containerNode, insertIdx) {
  const newNodes = [];
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const name = file.name.replace(/\.[^.]+$/, '');
    const loc = inferLocation(name);
    const cam = inferCamera(name);

    if (!state.shelf.find(s => s.filename === name)) {
      const objectUrl = URL.createObjectURL(file);
      state.shelf.push({ filename: name, location: loc, ratio: '3/2', objectUrl, camera: cam });
      saveImage(name, file);

      const img = new Image();
      img.onload = () => {
        const ratio = img.width >= img.height ? '3/2' : '2/3';
        const entry = state.shelf.find(s => s.filename === name);
        if (entry) entry.ratio = ratio;
        for (const p of getAllPhotos()) {
          if (p.filename === name) p.ratio = ratio;
        }
        scheduleRatioRender();
      };
      img.src = objectUrl;
    }

    const shelfEntry = state.shelf.find(s => s.filename === name);
    newNodes.push({
      id: uid(), type: 'photo',
      location: loc, filename: name,
      ratio: shelfEntry?.ratio || '3/2',
      caption: '', alt: '', classes: []
    });
  }

  containerNode.children.splice(insertIdx, 0, ...newNodes);

  const cameras = [...new Set(state.shelf.map(s => s.camera).filter(Boolean))];
  if (cameras.length && !state.meta.camera) {
    state.meta.camera = cameras.join(', ');
    document.getElementById('meta-camera').value = state.meta.camera;
  }

  renderShelf();
  renderCanvas();
  saveState();
}

function getShelfPhoto(filename) {
  return state.shelf.find(s => s.filename === filename);
}

// ─── Canvas Rendering ───────────────────────────────────
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';

  if (state.nodes.length === 0) {
    // no empty message, just show the + button
  } else {
    state.nodes.forEach(node => {
      canvas.appendChild(renderNode(node));
    });
  }

  // Add block button at the bottom
  const addBlockBtn = document.createElement('button');
  addBlockBtn.className = 'canvas__add';
  addBlockBtn.textContent = '+';
  addBlockBtn.title = 'Add stack, row, grid, or text';
  addBlockBtn.onclick = (e) => { e.stopPropagation(); showAddMenu(e); };
  canvas.appendChild(addBlockBtn);

  initSortable(canvas, state.nodes, true);
  updateCoverDropdown();
  updateShelfUsedState();
  saveState();
}

function updateShelfUsedState() {
  const usedFilenames = new Set(getAllPhotos().map(p => p.filename));
  document.querySelectorAll('.shelf__photo').forEach(el => {
    el.classList.toggle('is-used', usedFilenames.has(el.dataset.filename));
  });
}

// Canvas-level drop (registered once, outside renderCanvas)
(function() {
  const canvas = document.getElementById('canvas');
  canvas.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });
  canvas.addEventListener('drop', e => {
    // Only handle if dropped on the canvas itself, not inside a container node
    if (e.target !== canvas && !e.target.classList.contains('canvas__empty') && !e.target.classList.contains('canvas__add')) {
      // Check if drop target is inside a container — if so, let the container handle it
      if (e.target.closest('.node')) return;
    }
    e.preventDefault();
    e.stopPropagation();

    const stack = { id: uid(), type: 'stack', classes: [], children: [] };

    if (e.dataTransfer.files && e.dataTransfer.files.length) {
      addFilesToNewStack(e.dataTransfer.files, stack);
      return;
    }

    try {
      const data = JSON.parse(e.dataTransfer.getData('text/plain'));
      if (data.source === 'shelf') {
        stack.children.push({
          id: uid(), type: 'photo',
          location: data.location, filename: data.filename,
          ratio: data.ratio || '3/2', caption: '', alt: '', classes: []
        });
        state.nodes.push(stack);
        renderCanvas();
      }
    } catch {}
  });
})();

function renderNode(node) {
  const wrapper = document.createElement('div');
  wrapper.className = 'node';
  wrapper.dataset.type = node.type;
  wrapper.dataset.id = node.id;

  if (node.type === 'photo') return renderPhotoNode(node, wrapper);
  if (node.type === 'text') return renderTextNode(node, wrapper);
  return renderContainerNode(node, wrapper);
}

function renderContainerNode(node, wrapper) {
  // Controls
  const controls = document.createElement('div');
  controls.className = 'node__controls';
  controls.innerHTML = `
    <span class="node__handle" title="Drag to reorder">⠿</span>
    <span class="node__label" title="Click to change type" style="cursor:pointer">${node.type}</span>
  `;

  // Click label to cycle container type
  controls.querySelector('.node__label').addEventListener('click', (e) => {
    e.stopPropagation();
    const types = ['stack', 'row', 'grid'];
    const idx = types.indexOf(node.type);
    node.type = types[(idx + 1) % types.length];
    // Keep only classes valid for the new type
    const validClasses = getClassOptions(node.type);
    node.classes = node.classes.filter(c => validClasses.includes(c));
    renderCanvas();
  });

  // Class toggles
  const classOpts = getClassOptions(node.type);
  if (classOpts.length) {
    const classDiv = document.createElement('div');
    classDiv.className = 'node__classes';
    classOpts.forEach(cls => {
      const btn = document.createElement('button');
      btn.className = 'class-toggle' + (node.classes.includes(cls) ? ' is-active' : '');
      btn.textContent = cls;
      btn.onclick = (e) => {
        e.stopPropagation();
        toggleClass(node, cls);
      };
      classDiv.appendChild(btn);
    });
    controls.appendChild(classDiv);
  }

  // Delete button
  const delBtn = document.createElement('button');
  delBtn.className = 'node__btn is-delete';
  delBtn.innerHTML = '✕';
  delBtn.title = 'Delete';
  delBtn.onclick = (e) => { e.stopPropagation(); removeNode(node.id); };
  controls.appendChild(delBtn);

  wrapper.appendChild(controls);

  // Container
  const containerClass = `${node.type}-container ${node.classes.join(' ')}`.trim();
  const container = document.createElement('div');
  container.className = containerClass;
  container.dataset.parentId = node.id;

  if (node.children) {
    node.children.forEach(child => {
      container.appendChild(renderNode(child));
    });
  }

  initSortable(container, node.children, false);

  // Enable drop from shelf or Finder, with indicator
  container.style.position = 'relative';
  let indicator = null;

  container.addEventListener('dragover', e => {
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'copy';

    if (!indicator) {
      indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      container.appendChild(indicator);
    }

    const isVertical = node.type === 'stack';
    const insertIdx = getDropIndex(container, e, isVertical);
    positionIndicator(container, indicator, insertIdx, isVertical);
  });

  container.addEventListener('dragleave', e => {
    if (!container.contains(e.relatedTarget)) {
      removeIndicator();
    }
  });

  container.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();

    const isVertical = node.type === 'stack';
    const insertIdx = getDropIndex(container, e, isVertical);
    removeIndicator();

    // Files from Finder
    if (e.dataTransfer.files && e.dataTransfer.files.length) {
      addFilesToContainerAt(e.dataTransfer.files, node, insertIdx);
      return;
    }

    // From shelf
    try {
      const data = JSON.parse(e.dataTransfer.getData('text/plain'));
      if (data.source === 'shelf') {
        const photoNode = {
          id: uid(), type: 'photo',
          location: data.location, filename: data.filename,
          ratio: data.ratio || '3/2', caption: '', alt: '', classes: []
        };
        node.children.splice(insertIdx, 0, photoNode);
        renderCanvas();
      }
    } catch {}
  });

  function removeIndicator() {
    if (indicator) { indicator.remove(); indicator = null; }
  }

  wrapper.appendChild(container);

  // Add child button — floating on the right, outside the container
  const addBtn = document.createElement('button');
  addBtn.className = 'add-child-btn';
  addBtn.textContent = '+';
  addBtn.title = node.type === 'stack' ? 'Add photo, row, grid, or text' : 'Add photo';
  addBtn.onclick = (e) => { e.stopPropagation(); showAddChildMenu(e, node); };
  wrapper.appendChild(addBtn);

  return wrapper;
}

function renderPhotoNode(node, wrapper) {
  wrapper.classList.add('photo-item-wrapper');
  const div = document.createElement('div');
  div.className = 'photo-item';

  const shelf = getShelfPhoto(node.filename);
  const imgSrc = shelf?.objectUrl || `https://img.javier.computer/${node.location}/${node.filename}_2880.jpg`;

  const ratioStyle = node.ratio ? `aspect-ratio: ${node.ratio}; object-fit: cover;` : '';

  div.innerHTML = `
    <img src="${imgSrc}" alt="${node.alt || node.filename}" style="${ratioStyle}"
         onerror="this.dataset.failed='true'; this.alt='${node.filename}'">
    <button class="photo-remove" onclick="removeNode('${node.id}')">✕</button>
    <div class="photo-overlay">
      <div class="photo-overlay__info">
        <div class="photo-overlay__filename">${node.location}/${node.filename}</div>
        <div class="photo-overlay__fields">
          <input placeholder="Caption" value="${escAttr(node.caption)}"
                 onchange="updatePhotoField('${node.id}', 'caption', this.value)">
        </div>
      </div>
    </div>
  `;

  wrapper.appendChild(div);
  return wrapper;
}

function renderTextNode(node, wrapper) {
  const controls = document.createElement('div');
  controls.className = 'node__controls';
  controls.innerHTML = `
    <span class="node__handle" title="Drag to reorder">⠿</span>
    <span class="node__label">text</span>
  `;
  const delBtn = document.createElement('button');
  delBtn.className = 'node__btn is-delete';
  delBtn.innerHTML = '✕';
  delBtn.onclick = () => { removeNode(node.id); };
  controls.appendChild(delBtn);
  wrapper.appendChild(controls);

  const container = document.createElement('div');
  container.className = 'text-container';

  const editable = document.createElement('div');
  editable.className = 'text-editable';
  editable.contentEditable = true;

  // Ensure content is wrapped in <p> tags
  let html = node.html || '';
  if (html && !html.trim().startsWith('<')) {
    html = html.split(/\n\n+/).map(p => `<p>${p.trim()}</p>`).join('');
  }
  editable.innerHTML = html;

  // Force paragraph mode: Enter creates <p>, not <br>
  editable.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.execCommand('insertParagraph', false);
    }
  });

  // On focus, ensure there's at least one <p> to type into
  editable.addEventListener('focus', () => {
    if (!editable.querySelector('p')) {
      editable.innerHTML = '<p><br></p>';
      const sel = window.getSelection();
      const range = document.createRange();
      range.setStart(editable.querySelector('p'), 0);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }
  });

  editable.addEventListener('blur', () => {
    // Clean up: convert any stray text nodes or <br>s into <p>s
    cleanUpContentEditable(editable);
    node.html = editable.innerHTML;
    saveState();
  });

  container.appendChild(editable);
  wrapper.appendChild(container);
  return wrapper;
}

function cleanUpContentEditable(el) {
  // Wrap any bare text nodes in <p>
  Array.from(el.childNodes).forEach(child => {
    if (child.nodeType === 3 && child.textContent.trim()) {
      const p = document.createElement('p');
      child.replaceWith(p);
      p.textContent = child.textContent;
    }
    // Convert <div> to <p> (some browsers insert <div> instead)
    if (child.nodeName === 'DIV') {
      const p = document.createElement('p');
      p.innerHTML = child.innerHTML;
      child.replaceWith(p);
    }
    // Remove bare <br> between paragraphs
    if (child.nodeName === 'BR') {
      child.remove();
    }
  });
}

function escAttr(str) {
  return (str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getClassOptions(type) {
  switch (type) {
    case 'stack': return ['has-margin-top', 'has-margin-bottom', 'with-caption'];
    case 'row': return ['has-one', 'has-two', 'has-margin-bottom'];
    case 'grid': return ['is-square', 'is-vertical', 'is-half', 'has-margin-bottom'];
    default: return [];
  }
}

function toggleClass(node, cls) {
  const idx = node.classes.indexOf(cls);
  if (idx >= 0) node.classes.splice(idx, 1);
  else node.classes.push(cls);
  renderCanvas();
}

function updatePhotoField(id, field, value) {
  const node = findNode(id);
  if (node) {
    node[field] = value;
    saveState();
  }
}

// ─── SortableJS ─────────────────────────────────────────
let sortableGhost = null;
function onSortableMouseMove(e) {
  if (sortableGhost) {
    sortableGhost.style.left = (e.clientX - 40) + 'px';
    sortableGhost.style.top = (e.clientY - 40) + 'px';
  }
}

function initSortable(el, list, isRoot) {
  new Sortable(el, {
    group: 'nodes',
    animation: 150,
    handle: isRoot ? '.node__handle' : undefined,
    draggable: '.node',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    forceFallback: true,
    fallbackClass: 'sortable-fallback',
    fallbackTolerance: 3,
    filter: '.add-child-btn, .canvas__add',
    onStart(evt) {
      // Find the image in the dragged element
      const img = evt.item.querySelector('img');
      if (img) {
        sortableGhost = document.createElement('img');
        sortableGhost.className = 'sortable-custom-ghost';
        sortableGhost.src = img.src;
        document.body.appendChild(sortableGhost);
        document.addEventListener('mousemove', onSortableMouseMove);
      }
    },
    onEnd(evt) {
      if (sortableGhost) {
        sortableGhost.remove();
        sortableGhost = null;
        document.removeEventListener('mousemove', onSortableMouseMove);
      }
      syncOrderFromDOM();
      renderCanvas();
    }
  });
}

function syncOrderFromDOM() {
  // Rebuild state.nodes from the DOM structure
  const canvas = document.getElementById('canvas');
  state.nodes = collectNodesFromDOM(canvas);
}

function collectNodesFromDOM(el) {
  const result = [];
  for (const child of el.children) {
    if (!child.classList.contains('node')) continue;
    const id = child.dataset.id;
    const node = findNodeGlobal(id);
    if (!node) continue;

    if (node.children) {
      const container = child.querySelector(`.${node.type}-container`);
      if (container) {
        node.children = collectNodesFromDOM(container);
      }
    }
    result.push(node);
  }
  return result;
}

// Search in a flat cache so we don't lose nodes during reorder
let nodeCache = {};
function buildNodeCache(nodes) {
  nodeCache = {};
  function walk(list) {
    for (const n of list) {
      nodeCache[n.id] = n;
      if (n.children) walk(n.children);
    }
  }
  walk(nodes || state.nodes);
}

function findNodeGlobal(id) {
  return nodeCache[id] || findNode(id);
}

// ─── Add containers ─────────────────────────────────────
function showAddMenu(e) {
  const menu = document.getElementById('contextMenu');
  menu.innerHTML = '';

  // Add photos option — creates a new stack with the selected photos
  const photosBtn = document.createElement('button');
  photosBtn.className = 'context-menu__item';
  photosBtn.textContent = 'Add photos…';
  photosBtn.onclick = () => {
    closeContextMenu();
    const input = document.getElementById('fileInput');
    input.onchange = function() {
      const stackNode = { id: uid(), type: 'stack', classes: [], children: [] };
      state.nodes.push(stackNode);
      addFilesToContainer(this.files, stackNode);
      this.onchange = originalFileInputHandler;
    };
    input.click();
  };
  menu.appendChild(photosBtn);

  const sep = document.createElement('div');
  sep.className = 'context-menu__sep';
  menu.appendChild(sep);

  ['stack', 'row', 'grid', 'text'].forEach(type => {
    const btn = document.createElement('button');
    btn.className = 'context-menu__item';
    btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
    btn.onclick = () => {
      addTopLevelNode(type);
      closeContextMenu();
    };
    menu.appendChild(btn);
  });

  showContextMenuAt(menu, e);
}

function showAddChildMenu(e, parentNode) {
  const menu = document.getElementById('contextMenu');
  menu.innerHTML = '';

  // Add photo directly into this container
  const addBtn = document.createElement('button');
  addBtn.className = 'context-menu__item';
  addBtn.textContent = 'Add photo…';
  addBtn.onclick = () => {
    closeContextMenu();
    const input = document.getElementById('fileInput');
    input.onchange = function() {
      addFilesToContainer(this.files, parentNode);
      this.onchange = originalFileInputHandler;
    };
    input.click();
  };
  menu.appendChild(addBtn);

  // Photos from shelf
  if (state.shelf.length) {
    const sep = document.createElement('div');
    sep.className = 'context-menu__sep';
    menu.appendChild(sep);

    const header = document.createElement('div');
    header.style.cssText = 'padding:4px 12px; font-size:0.65rem; opacity:0.4; text-transform:uppercase;';
    header.textContent = 'From shelf';
    menu.appendChild(header);

    state.shelf.forEach(photo => {
      const btn = document.createElement('button');
      btn.className = 'context-menu__item';
      btn.textContent = photo.filename.substring(photo.filename.lastIndexOf('-') + 1);
      btn.title = photo.filename;
      btn.onclick = () => {
        parentNode.children.push({
          id: uid(), type: 'photo',
          location: photo.location, filename: photo.filename,
          ratio: photo.ratio || '3/2', caption: '', alt: '', classes: []
        });
        closeContextMenu();
        renderCanvas();
      };
      menu.appendChild(btn);
    });
  }

  // Nested containers (only in stacks)
  if (parentNode.type === 'stack') {
    const sep = document.createElement('div');
    sep.className = 'context-menu__sep';
    menu.appendChild(sep);

    ['row', 'grid', 'stack', 'text'].forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'context-menu__item';
      btn.textContent = '+ ' + type;
      btn.onclick = () => {
        const node = type === 'text'
          ? { id: uid(), type: 'text', classes: [], html: '<p></p>' }
          : { id: uid(), type, classes: [], children: [] };
        parentNode.children.push(node);
        closeContextMenu();
        renderCanvas();
      };
      menu.appendChild(btn);
    });
  }

  showContextMenuAt(menu, e);
}

function showContextMenuAt(menu, e) {
  const rect = e.target.getBoundingClientRect();
  menu.style.left = rect.left + 'px';
  // Temporarily show off-screen to measure height
  menu.style.top = '-9999px';
  menu.classList.add('is-open');
  const menuHeight = menu.offsetHeight;
  const spaceBelow = window.innerHeight - rect.bottom - 4;

  if (spaceBelow < menuHeight) {
    // Open upward
    menu.style.top = (rect.top - menuHeight - 4) + 'px';
  } else {
    menu.style.top = (rect.bottom + 4) + 'px';
  }

  setTimeout(() => {
    document.addEventListener('click', closeContextMenu, { once: true });
  }, 0);
}

function closeContextMenu() {
  document.getElementById('contextMenu').classList.remove('is-open');
}

function addTopLevelNode(type) {
  if (type === 'text') {
    state.nodes.push({ id: uid(), type: 'text', classes: [], html: '<p></p>' });
  } else {
    state.nodes.push({ id: uid(), type, classes: [], children: [] });
  }
  renderCanvas();
}

function exportMarkdown() {
  const md = generateMarkdown();
  document.getElementById('exportOutput').value = md;
  document.getElementById('exportModal').classList.add('is-open');
}

function closeExportModal() {
  document.getElementById('exportModal').classList.remove('is-open');
}

function copyExport() {
  const ta = document.getElementById('exportOutput');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = ta.closest('.modal').querySelector('.is-primary');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function generateMarkdown() {
  const m = state.meta;
  const photos = getAllPhotos();

  let yaml = '---\n';
  yaml += `layout: reportage\n`;
  yaml += `title: "${m.title}"\n`;
  if (m.hideTitle) yaml += `hide_title: true\n`;
  yaml += `date: "${m.date ? m.date + ' 00:00:00 +0200' : ''}"\n`;
  yaml += `category: reportage\n`;
  yaml += `tag: photo\n`;
  yaml += `location: ${m.location}\n`;

  if (m.camera) {
    const cams = m.camera.split(',').map(c => c.trim()).filter(Boolean);
    if (cams.length === 1) {
      yaml += `camera: ${cams[0]}\n`;
    } else {
      yaml += `camera:\n`;
      cams.forEach(c => yaml += `  - ${c}\n`);
    }
  }

  yaml += `cover: ${m.cover || (photos[0]?.filename || '')}\n`;
  yaml += `ratio: ${m.ratio}\n`;

  if (m.intro) {
    yaml += `intro: >\n`;
    m.intro.split('\n').forEach(line => yaml += `  ${line}\n`);
  }
  if (m.translation) {
    yaml += `translation: >\n`;
    m.translation.split('\n').forEach(line => yaml += `  ${line}\n`);
  }
  if (m.permalink) yaml += `permalink: ${m.permalink}\n`;

  // Filenames
  yaml += `filenames:\n`;
  photos.forEach(p => {
    yaml += `  - filename: ${p.filename}\n`;
    if (p.location && p.location !== m.location) {
      yaml += `    location: ${p.location}\n`;
    }
    if (p.ratio) yaml += `    ratio: ${p.ratio}\n`;
    if (p.caption) yaml += `    caption: ${p.caption}\n`;
  });

  yaml += '---\n';

  // Body
  let body = '\n';
  state.nodes.forEach(node => {
    body += renderNodeToLiquid(node, 0);
    body += '\n';
  });

  return yaml + body;
}

function renderNodeToLiquid(node, depth) {
  const indent = '    '.repeat(depth);

  if (node.type === 'photo') {
    let tag = `${indent}{% photo ${node.location} ${node.filename}`;
    if (node.ratio) tag += ` ${node.ratio}`;
    if (node.caption) tag += ` caption:"${node.caption}"`;
    if (node.alt) tag += ` alt:"${node.alt}"`;
    tag += ` %}\n`;
    return tag;
  }

  if (node.type === 'text') {
    // Clean up the HTML: remove empty tags, normalize whitespace
    const div = document.createElement('div');
    div.innerHTML = node.html;
    // Remove empty paragraphs
    div.querySelectorAll('p, div').forEach(el => {
      if (!el.textContent.trim() && !el.querySelector('img, br')) el.remove();
    });
    const cleaned = div.innerHTML.trim();
    if (!cleaned) return '';

    // Indent the HTML content
    const innerIndent = indent + '    ';
    const indented = cleaned.split('\n').map(line => {
      const trimmed = line.trim();
      return trimmed ? innerIndent + trimmed : '';
    }).filter(Boolean).join('\n');

    let out = `${indent}{% text %}\n`;
    out += indented + '\n';
    out += `${indent}{% endtext %}\n`;
    return out;
  }

  // Container
  const classes = node.classes.length ? ' ' + node.classes.join(' ') : '';
  let out = `${indent}{% ${node.type}${classes} %}\n`;
  (node.children || []).forEach(child => {
    out += renderNodeToLiquid(child, depth + 1);
  });
  out += `${indent}{% end${node.type} %}\n`;
  return out;
}

// ─── Import ─────────────────────────────────────────────
function importMarkdown() {
  document.getElementById('importInput').value = '';
  document.getElementById('importModal').classList.add('is-open');
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('is-open');
}

function doImport() {
  const input = document.getElementById('importInput').value.trim();
  if (!input) return;

  try {
    const parsed = parseMarkdown(input);
    Object.assign(state.meta, parsed.meta);
    state.nodes = parsed.nodes;

    // Build shelf from filenames in the document
    const photos = getAllPhotos();
    photos.forEach(p => {
      if (!state.shelf.find(s => s.filename === p.filename)) {
        state.shelf.push({
          filename: p.filename,
          location: p.location,
          ratio: p.ratio,
          objectUrl: null,
          camera: inferCamera(p.filename)
        });
      }
    });

    syncMetaUI();
    renderShelf();
    renderCanvas();
    closeImportModal();
  } catch (err) {
    alert('Parse error: ' + err.message);
    console.error(err);
  }
}

function parseMarkdown(input) {
  // Split frontmatter and body
  const parts = input.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!parts) throw new Error('No frontmatter found');

  const meta = parseFrontmatter(parts[1]);
  const nodes = parseBody(parts[2]);
  return { meta, nodes };
}

function parseFrontmatter(yaml) {
  const meta = {
    title: '', date: '', location: '', camera: '',
    cover: '', ratio: '3/2', intro: '', translation: '',
    permalink: '', hideTitle: false
  };

  let currentKey = null;
  let multilineValue = '';
  let inArray = false;
  let arrayValues = [];

  const lines = yaml.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Multiline scalar (>) continuation
    if (currentKey && (currentKey === 'intro' || currentKey === 'translation') && /^ {2}\S/.test(line)) {
      multilineValue += (multilineValue ? '\n' : '') + line.substring(2);
      continue;
    } else if (currentKey && multilineValue) {
      meta[currentKey] = multilineValue;
      multilineValue = '';
      currentKey = null;
    }

    // Array item
    if (inArray && /^ {2}-/.test(line)) {
      const val = line.replace(/^ {2}- ?/, '').trim();
      arrayValues.push(val);
      continue;
    } else if (inArray) {
      meta.camera = arrayValues.join(', ');
      inArray = false;
      arrayValues = [];
    }

    // Key: value
    const kv = line.match(/^(\w[\w_]*)\s*:\s*(.*)$/);
    if (!kv) continue;

    const key = kv[1];
    let val = kv[2].trim().replace(/^["']|["']$/g, '');

    if (key === 'hide_title') {
      meta.hideTitle = val === 'true';
    } else if (key === 'date') {
      meta.date = val.substring(0, 10); // Just the date part
    } else if (key === 'camera' && !val) {
      inArray = true;
      arrayValues = [];
    } else if (key === 'camera') {
      meta.camera = val;
    } else if ((key === 'intro' || key === 'translation') && val === '>') {
      currentKey = key;
      multilineValue = '';
    } else if (key === 'filenames') {
      // Skip — we'll rebuild from body
    } else if (key in meta) {
      meta[key] = val;
    }
  }

  if (currentKey && multilineValue) {
    meta[currentKey] = multilineValue;
  }
  if (inArray) {
    meta.camera = arrayValues.join(', ');
  }

  return meta;
}

function parseBody(body) {
  const tokens = tokenize(body);
  return parseTokens(tokens, null);
}

function tokenize(body) {
  const tokens = [];
  const re = /\{%[-\s]*(end)?(stack|row|grid|text|photo)\s*([\s\S]*?)[-\s]*%\}/g;
  let match;
  let lastIdx = 0;

  while ((match = re.exec(body)) !== null) {
    // Capture any HTML between tags
    if (match.index > lastIdx) {
      const html = body.substring(lastIdx, match.index).trim();
      if (html) tokens.push({ type: 'html', content: html });
    }

    const isEnd = !!match[1];
    const tag = match[2];
    const params = match[3].trim();

    if (tag === 'photo') {
      tokens.push({ type: 'photo', params });
    } else if (isEnd) {
      tokens.push({ type: 'close', tag });
    } else {
      tokens.push({ type: 'open', tag, params });
    }

    lastIdx = re.lastIndex;
  }

  // Trailing HTML
  const trailing = body.substring(lastIdx).trim();
  if (trailing) tokens.push({ type: 'html', content: trailing });

  return tokens;
}

function parseTokens(tokens, closeTag) {
  const nodes = [];

  while (tokens.length) {
    const tok = tokens[0];

    if (tok.type === 'close') {
      if (tok.tag === closeTag) {
        tokens.shift();
        return nodes;
      }
      // Unexpected close — stop
      break;
    }

    tokens.shift();

    if (tok.type === 'photo') {
      nodes.push(parsePhotoTag(tok.params));
    } else if (tok.type === 'open') {
      if (tok.tag === 'text') {
        // Collect HTML until endtext
        let html = '';
        while (tokens.length && !(tokens[0].type === 'close' && tokens[0].tag === 'text')) {
          const t = tokens.shift();
          if (t.type === 'html') html += t.content;
        }
        if (tokens.length) tokens.shift(); // consume endtext
        const classes = tok.params ? tok.params.split(/\s+/).filter(Boolean) : [];
        nodes.push({ id: uid(), type: 'text', classes, html });
      } else {
        const classes = tok.params ? tok.params.split(/\s+/).filter(Boolean) : [];
        const children = parseTokens(tokens, tok.tag);
        nodes.push({ id: uid(), type: tok.tag, classes, children });
      }
    } else if (tok.type === 'html') {
      // Standalone HTML outside containers — wrap in text
      if (tok.content.length > 10) {
        nodes.push({ id: uid(), type: 'text', classes: [], html: tok.content });
      }
    }
  }

  return nodes;
}

function parsePhotoTag(params) {
  let location = '', filename = '', ratio = '', caption = '', alt = '', cls = '';

  // Extract named params first
  let remaining = params;
  remaining = remaining.replace(/(\w+):"([^"]*)"/g, (_, k, v) => {
    if (k === 'caption') caption = v;
    else if (k === 'alt') alt = v;
    else if (k === 'class') cls = v;
    else if (k === 'ratio') ratio = v;
    return '';
  });
  remaining = remaining.replace(/(\w+):'([^']*)'/g, (_, k, v) => {
    if (k === 'caption') caption = v;
    else if (k === 'alt') alt = v;
    return '';
  });

  const parts = remaining.trim().split(/\s+/).filter(Boolean);
  location = parts[0] || '';
  filename = parts[1] || '';
  if (parts[2] && /^\d+\/\d+$/.test(parts[2])) ratio = parts[2];

  return {
    id: uid(), type: 'photo',
    location, filename, ratio: ratio || '3/2',
    caption, alt, classes: cls ? [cls] : []
  };
}

// ─── Header collapse on scroll ──────────────────────────
(function() {
  const header = document.getElementById('header');
  let collapsed = false;

  window.addEventListener('scroll', () => {
    const shouldCollapse = window.scrollY > 120;
    if (shouldCollapse !== collapsed) {
      collapsed = shouldCollapse;
      header.classList.toggle('is-collapsed', collapsed);
    }
  });

  // Peek when cursor near top of viewport
  document.addEventListener('mousemove', (e) => {
    if (!collapsed) return;
    header.classList.toggle('is-peeking', e.clientY < 50);
  });
})();

// ─── Drag preview ───────────────────────────────────────
let dragPreview = null;
function createDragPreview(imgSrc) {
  if (dragPreview) dragPreview.remove();
  dragPreview = document.createElement('div');
  dragPreview.className = 'drag-preview';
  dragPreview.innerHTML = `<img src="${imgSrc}">`;
  document.body.appendChild(dragPreview);
  return dragPreview;
}
function removeDragPreview() {
  if (dragPreview) { dragPreview.remove(); dragPreview = null; }
}

// ─── File input ─────────────────────────────────────────
const originalFileInputHandler = function() { handleFiles(this.files); };
document.getElementById('fileInput').onchange = originalFileInputHandler;

// ─── Theme ──────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? 'Light' : 'Dark';
  localStorage.setItem('reportage-editor-theme', next);
}

(function initTheme() {
  const saved = localStorage.getItem('reportage-editor-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? 'Light' : 'Dark';
})();

// ─── Init ───────────────────────────────────────────────
const loaded = loadState();
if (loaded) {
  syncMetaUI();
  renderShelf();
  restoreImages();
}
buildNodeCache(state.nodes);
renderCanvas();
</script>
</body>
