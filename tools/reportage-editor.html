<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportage Editor</title>
<link rel="stylesheet" href="reportage-editor.css">
</head>
<body>

<!-- Header (toolbar + shelf) -->
<div class="header" id="header">
<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <div class="toolbar__group toolbar__group--left">
    <button onclick="toggleShelf()" id="shelfToggleBtn" class="toolbar__icon-btn" title="Toggle photo shelf">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
    <select id="reportageSelect" onchange="loadReportage(this.value)" title="Open existing reportage">
      <option value="">Open…</option>
    </select>
  </div>
  <div class="toolbar__group">
    <button class="is-primary" onclick="newReportage()">New</button>
    <button onclick="openMarkdownModal()">Markdown</button>
    <button onclick="toggleSidebar()" id="sidebarToggleBtn" class="toolbar__icon-btn" title="Toggle settings sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
    </button>
    <div class="toolbar__menu-wrap">
      <button onclick="toggleToolbarMenu(event)" class="toolbar__icon-btn" title="More options">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
      <div class="toolbar__menu" id="toolbarMenu">
        <div class="toolbar__menu-section">
          <span class="toolbar__menu-label">Appearance</span>
          <button class="toolbar__menu-item" data-theme="light" onclick="setTheme('light')"><span class="toolbar__menu-check"></span>Light</button>
          <button class="toolbar__menu-item" data-theme="dark" onclick="setTheme('dark')"><span class="toolbar__menu-check"></span>Dark</button>
          <button class="toolbar__menu-item" data-theme="system" onclick="setTheme('system')"><span class="toolbar__menu-check"></span>System</button>
        </div>
      </div>
    </div>
  </div>
</div>

</div><!-- /header -->

<!-- Main layout -->
<div class="editor-layout" id="editorLayout">

<!-- Photo Shelf (left sidebar) -->
<div class="shelf-panel" id="shelfPanel">
  <div class="shelf" id="shelf"
       ondragover="shelfDragOver(event)" ondragleave="shelfDragLeave(event)" ondrop="shelfDrop(event)"
       onclick="document.getElementById('fileInput').click()">
    <span class="shelf__hint" id="shelfHint">Drop photos here or click to browse</span>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onclick="event.stopPropagation()">
  </div>
  <div class="shelf__resize" id="shelfResize"></div>
</div>

<!-- Canvas -->
<div class="canvas" id="canvas"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar__header">
    <span class="sidebar__title">Post</span>
  </div>
  <div class="sidebar__body">
    <div class="sidebar__section">
      <div class="sidebar__field">
        <label>Title</label>
        <input id="meta-title" oninput="updateMeta('title', this.value)">
      </div>
      <div class="sidebar__field">
        <label>Date</label>
        <input type="date" id="meta-date" oninput="updateMeta('date', this.value)">
      </div>
      <div class="sidebar__field">
        <label>Default location</label>
        <input id="meta-location" placeholder="e.g. madrid" oninput="updateMeta('location', this.value)">
      </div>
      <div class="sidebar__field">
        <label>Camera</label>
        <input id="meta-camera" placeholder="e.g. Ricoh GR IIIx, Fuji X-T5" oninput="updateMeta('camera', this.value)">
      </div>
      <div class="sidebar__field">
        <label>Cover</label>
        <select id="meta-cover" onchange="updateMeta('cover', this.value)">
          <option value="">— Select —</option>
        </select>
      </div>
      <input type="hidden" id="meta-ratio" value="3/2">
      <div class="sidebar__field">
        <label>Intro</label>
        <textarea id="meta-intro" rows="3" oninput="updateMeta('intro', this.value)"></textarea>
      </div>
      <div class="sidebar__field">
        <label>Translation</label>
        <textarea id="meta-translation" rows="3" oninput="updateMeta('translation', this.value)"></textarea>
      </div>
    </div>
  </div>
</div>

</div><!-- /editor-layout -->

<!-- Context Menu -->
<div class="context-menu" id="contextMenu"></div>

<!-- Markdown Modal -->
<div class="modal-overlay" id="markdownModal" onmousedown="if(event.target===this)closeMarkdownModal()">
  <div class="modal">
    <div class="modal__header">
      <h3>Markdown</h3>
      <button onclick="closeMarkdownModal()">✕</button>
    </div>
    <div class="modal__body">
      <textarea class="export-output" id="markdownOutput" placeholder="Paste your reportage markdown here to import..."></textarea>
    </div>
    <div class="modal__footer">
      <button id="importBtn" onclick="doImportFromModal()" disabled>Import</button>
      <button class="is-primary" onclick="copyMarkdown()">Copy to clipboard</button>
    </div>
  </div>
</div>

<script src="reportage-editor.js"></script>
</body>
</html>
