<div class="post__pagination">
  {% if include.post.previous.url -%}
  <div class="post__pagination-prev"><span class="post__pagination-arrow">←</span> <a class="post__pagination-link is-{{ include.post.previous.category}}" href="{{include.post.previous.url}}">{{ include.post.previous.title }}</a></div>
  {% endif -%}
  {% if include.post.next.url -%}
  <div class="post__pagination-next"><span class="post__pagination-arrow">→</span> <a class="post__pagination-link is-{{ include.post.next.category}}" href="{{include.post.next.url}}">{{ include.post.next.title }}</a></div>
  {% endif -%}
</div>
